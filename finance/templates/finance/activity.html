{% extends "finance/layout.html" %}
{% load static %}
{% block title %}Activity{% endblock title %}
{% block script %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{% static "finance/activity.js" %}"></script>
{% endblock script %}
{% block body %}
<div id='container'>
  <div id='transactionChart-div'>
    <canvas id="transactionChart"></canvas>
  </div>
    <div id='boxes'>
      <div id='chart-filters' >
        <div class="card border-success mb-3">
          <div class="card-header"><strong>Filters:</strong>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-filter" viewBox="0 0 16 16" style='float:right'>
              <path d="M6 10.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/>
            </svg>
          </div>
          <div class="card-body">
            <label for="chart-category">Category:</label>
            <select class='form-select' id="chart-category" onchange='destroyChart(false)'>
              <option value="All">All</option>
                {% for category in categories %}
                  <option value="{{category.id}}"> {{category.name}} </option>
                {% endfor %}
            </select>
            <label for="chart-date">Date:</label>
            <input type="date" id='chart-date' class='form-control' onchange='destroyChart(false)'>
            <label for="btn-group">Type:</label>
            <div class="btn-group" role="group" aria-label="Basic radio toggle button group" id='type-button'>
              <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked="" onclick='destroyChart(true)'>
              <label class="btn btn-outline-primary" for="btnradio1">Deposit</label>
              <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off" checked="" onclick='destroyChart(false)' >
              <label class="btn btn-outline-primary" for="btnradio2">Withdraw</label>
            </div>
          </div>
        </div>
      </div>
      <div class="card border-primary mb-3" id='stats'>
        <div class="card-header"><strong>Stats:</strong>
          <svg xmlns="http://www.w3.org/2000/svg" style='float:right' width="16" height="16" fill="currentColor" class="bi bi-bar-chart-steps" viewBox="0 0 16 16">
            <path d="M.5 0a.5.5 0 0 1 .5.5v15a.5.5 0 0 1-1 0V.5A.5.5 0 0 1 .5 0M2 1.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-4a.5.5 0 0 1-.5-.5zm2 4a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5zm2 4a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-6a.5.5 0 0 1-.5-.5zm2 4a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5z"/>
          </svg>
        </div>
        <div class="card-body">
            <p id='total-deposit'></p>
            <p id='total-withdraw'></p>
        </div>
      </div>
    </div>
</div>

{% endblock body %}
