{% extends "finance/layout.html" %}
{% load crispy_forms_tags %}

{% block title %}
Login
{% endblock title %}

{% block body %}
<div id='login-form' >
    <form method='post' action="{% url "login" %}">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-secondary">Login</button>
    </form>
    <p class="text-info"></p>
    <a href="{% url "register" %}" style='margin:0.5%;'><button type="button" class="btn btn-outline-info">New here? Create an account.</button></a>
</div>

{% endblock body %}
